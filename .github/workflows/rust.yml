name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Make and Dependencies
        run: sudo apt-get update && sudo apt-get install -y make

      - name: Build (Debug)
        run: make debug

      - name: Test
        run: make test

